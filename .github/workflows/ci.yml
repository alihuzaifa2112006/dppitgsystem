name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Run ESLint
        run: npm run lint || true # Warnings pipeline ko nahi rokhein gi

      - name: Build project
        # CI=false warnings ko error banane se rokega
        # NODE_OPTIONS memory crash (exit code 134) ko solve karega
        run: CI=false npm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"